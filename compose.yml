services:
  db:
    image: postgres
    restart: always
    environment:
      TZ: Asia/Tokyo
      POSTGRES_PASSWORD: password
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: pg_isready -U postgres -h 127.0.0.1
      interval: 5s
  redis:
    image: redis:6.2-alpine
    volumes:
      - redis:/data
    ports:
      - 6379
    healthcheck:
      test: redis-cli ping
      interval: 1s
      timeout: 3s
      retries: 30
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -c "yarn install && bundle install && bundle exec rails db:prepare && rm -f tmp/pids/server.pid && ./bin/dev"
    tty: true
    stdin_open: true
    volumes:
      - .:/myapp
      - bundle_data:/usr/local/bundle:cached
    environment:
      TZ: Asia/Tokyo
      REDIS_URL: redis://redis:6379/0
      SELENIUM_DRIVER_URL: "http://chrome:4444/wd/hub"
    ports:
      - "3000:3000"
    user: "1000:1000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  chrome:
    image: selenium/standalone-chromium
    ports:
      - 4444:4444
volumes:
  postgresql_data:
  bundle_data:
  redis:
